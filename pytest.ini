[pytest]
# Where pytest looks. The tests/ tree is the canonical home; the script files
# at the repo root are not tests (we don't want pytest to pick up runs of e.g.
# scripts/test_agent_smoke.py which is a hand-runnable smoke script, not a
# pytest test).
testpaths = tests

# pytest-bdd 7.x emits a PytestWarning per generated scenario about
# usefixtures() with no args. Upstream issue, harmless. Filter to keep CI
# output readable.
filterwarnings =
    ignore:usefixtures.*has no effect:pytest.PytestWarning

# Surface unknown markers loudly — protects us if someone typos a marker.
addopts = --strict-markers

# Markers we add ourselves are registered in tests/conftest.py via
# pytest_configure. Keep them in code, not here, so the docstring stays
# next to the registration call.
